name: Go Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - holodeck
          - observer
          - plugins/holodeck-apm
          - plugins/nodesim-target
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: gulducat/nomad-nodesim
          ref: feat/node-groups
          path: nomad-nodesim
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: Test ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go test ./...
