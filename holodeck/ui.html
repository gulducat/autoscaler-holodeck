<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Holodeck</title>
  <link rel="stylesheet" href="/ui.css">
</head>
<body>
  <header>
    <h1>Holodeck</h1>
    <span id="world-badge">world: default</span>
    <span id="status">loading…</span>
  </header>

  <details class="section-collapsible" open>
    <summary><span class="caret">▶</span> Authored Metrics</summary>
    <table class="metric-table">
      <thead><tr>
        <th>name</th><th>value</th>
        <th class="col-icon" title="modifiers"></th>
        <th class="col-icon" title="history"></th>
        <th class="col-act"></th>
      </tr></thead>
      <tbody id="authored-tbody"></tbody>
    </table>
  </details>

  <details class="section-collapsible" open>
    <summary><span class="caret">▶</span> Capacity-Coupled Metrics</summary>
    <table class="metric-table">
      <thead><tr>
        <th>name</th><th>base</th><th>alloc×</th><th>node×</th><th>min</th><th>max</th>
        <th class="col-icon"></th>
        <th class="col-icon"></th>
        <th class="col-act"></th>
      </tr></thead>
      <tbody id="cc-tbody"></tbody>
    </table>
  </details>

  <details class="section-collapsible" open>
    <summary><span class="caret">▶</span> Scheduled Metrics</summary>
    <table class="metric-table">
      <thead><tr>
        <th>name</th><th>value</th><th>info</th>
        <th class="col-icon"></th>
        <th class="col-act"></th>
      </tr></thead>
      <tbody id="scheduled-tbody"></tbody>
    </table>
  </details>

  <details class="section-collapsible" open>
    <summary><span class="caret">▶</span> Run Schedule</summary>
    <div class="schedule-form">
      <div class="schedule-fields">
        <label>Name<input type="text" id="sf-name" autocomplete="off"></label>
        <label>Start<input type="number" step="any" id="sf-start" value="0"></label>
        <label>Steps<input type="number" id="sf-count" value="5" min="1"></label>
        <label>Interval (s)<input type="number" step="any" id="sf-interval" value="5"></label>
        <label>Mode
          <select id="sf-delta">
            <option value="static">start + step×n</option>
            <option value="linear">start × (n+1)</option>
          </select>
        </label>
        <label id="sf-step-label">Step<input type="number" step="any" id="sf-change" value="1"></label>
        <button type="button" id="sf-run">Run</button>
      </div>
      <div id="sf-preview" class="schedule-preview"></div>
    </div>
  </details>

  <details id="sample-section" class="section-collapsible" open>
    <summary><span class="caret">▶</span> Sample Metrics</summary>
    <div id="sampled-wrapper">
      <table id="sampled-metric-table" class="sampled-metric-table">
        <thead><tr>
          <th>name</th><th>sampled value</th><th></th>
        </tr></thead>
      </table>
    </div>
  </details>

  <section id="danger-section">
    <button id="reset-btn" class="danger">Reset world</button>
  </section>

  <script>
    const worldID = 'default';
    const worldBase = `/v1/worlds/${worldID}`;
    let currentMetrics = {};

    const statusEl = document.getElementById('status');
    const worldBadge = document.getElementById('world-badge');
    function setStatus(msg) { statusEl.textContent = msg; }

    // ── API ─────────────────────────────────────────────────────────────────

    async function loadWorld() {
      try {
        const res = await fetch(worldBase);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        worldBadge.textContent = `world: ${data.id}`;
        currentMetrics = data.metrics || {};
        renderAll();
        setStatus(`updated ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus(`error: ${err.message}`);
      }
    }

    async function putWorld(metrics) {
      const res = await fetch(worldBase, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({metrics}),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      currentMetrics = data.metrics || {};
      renderAll();
    }

    function rulesSnapshot() {
      const m = {};
      for (const [n, e] of Object.entries(currentMetrics)) m[n] = e.rule;
      return m;
    }

    async function saveMetric(name, rule) {
      const m = rulesSnapshot();
      m[name] = rule;
      await putWorld(m);
    }

    async function deleteMetric(name) {
      const m = rulesSnapshot();
      delete m[name];
      await putWorld(m);
    }

    async function wrapSave(fn) {
      try {
        await fn();
        setStatus(`saved ${new Date().toLocaleTimeString()}`);
      } catch (err) {
        setStatus(`error: ${err.message}`);
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────

    function renderAll() {
      // Save which history sub-rows are currently open so polls don't collapse them.
      const openHist = new Set(
        [...document.querySelectorAll('.hist-sub-row:not([hidden])')].map(tr => tr.dataset.metric).filter(Boolean)
      );

      const authored = {}, cc = {}, scheduled = {};
      for (const [name, entry] of Object.entries(currentMetrics)) {
        const t = entry.rule.type;
        if (t === 'capacity_coupled') cc[name] = entry;
        else if (t === 'scheduled')   scheduled[name] = entry;
        else                          authored[name] = entry;
      }
      renderAuthored(authored);
      renderCC(cc);
      renderScheduled(scheduled);

      if (openHist.size) {
        document.querySelectorAll('.hist-sub-row').forEach(tr => {
          if (!openHist.has(tr.dataset.metric)) return;
          tr.hidden = false;
          document.querySelectorAll(`.btn-hist[data-metric="${CSS.escape(tr.dataset.metric)}"]`).forEach(btn => btn.classList.add('open'));
        });
      }
    }

    // ── DOM helpers ──────────────────────────────────────────────────────────

    function numIn(val, w) {
      const el = document.createElement('input');
      el.type = 'number'; el.step = 'any';
      el.value = val ?? ''; if (w) el.style.width = w;
      return el;
    }

    function numInPh(ph, w) {
      const el = numIn('', w); el.placeholder = ph; return el;
    }

    function txtIn(val, readOnly) {
      const el = document.createElement('input');
      el.type = 'text'; el.value = val ?? '';
      el.className = 'inp-name'; el.readOnly = !!readOnly;
      return el;
    }

    function txtInPh(ph) {
      const el = txtIn(''); el.placeholder = ph; return el;
    }

    function mkTd(content, cls) {
      const el = document.createElement('td');
      if (cls) el.className = cls;
      if (Array.isArray(content)) content.forEach(c => c && el.appendChild(c));
      else if (content instanceof Node) el.appendChild(content);
      else if (content != null) el.textContent = content;
      return el;
    }

    function iBtn(label, cls) {
      const b = document.createElement('button');
      b.type = 'button'; b.textContent = label; b.className = 'btn-icon ' + (cls || '');
      return b;
    }

    function hasModifiers(rule) {
      return !!(rule.lag_seconds || rule.saturation || rule.diminishing_returns_factor);
    }

    function makeModRow(rule, cols) {
      const tr = document.createElement('tr');
      tr.className = 'sub-row';
      tr.hidden = !hasModifiers(rule);
      const cell = document.createElement('td');
      cell.colSpan = cols; cell.className = 'sub-row-cell';

      const lagIn  = numIn(rule.lag_seconds || 0, '4em');
      const satIn  = numIn(rule.saturation || 0, '4em');
      const drIn   = numIn(rule.diminishing_returns_factor || 0, '4em');

      function pair(lbl, input) {
        const s = document.createElement('span');
        s.className = 'mod-pair';
        const l = document.createElement('span');
        l.className = 'mod-lbl'; l.textContent = lbl;
        s.append(l, input); return s;
      }

      cell.append(pair('lag (s)', lagIn), pair('saturation', satIn), pair('dr factor', drIn));
      tr.appendChild(cell);

      function getMods() {
        return {
          lag_seconds: parseFloat(lagIn.value) || 0,
          saturation: parseFloat(satIn.value) || 0,
          diminishing_returns_factor: parseFloat(drIn.value) || 0,
        };
      }
      return {tr, getMods};
    }

    function makeHistRow(history, cols) {
      if (!history || !history.length) return null;
      const tr = document.createElement('tr');
      tr.className = 'sub-row hist-sub-row'; tr.hidden = true;
      const cell = document.createElement('td');
      cell.colSpan = cols; cell.className = 'sub-row-cell';
      const list = document.createElement('div');
      list.className = 'hist-list';
      for (let i = history.length - 1; i >= 0; i--) {
        const e = history[i];
        const div = document.createElement('div');
        div.className = 'hist-entry';
        const t = new Date(e.set_at).toLocaleTimeString();
        div.textContent = `${t}  ${ruleShortText(e.rule)}`;
        list.appendChild(div);
      }
      cell.appendChild(list); tr.appendChild(cell);
      return tr;
    }

    function ruleShortText(rule) {
      if (rule.type === 'capacity_coupled') {
        const p = [];
        if (rule.base)         p.push(`base=${rule.base}`);
        if (rule.alloc_factor) p.push(`alloc×${rule.alloc_factor}`);
        if (rule.node_factor)  p.push(`node×${rule.node_factor}`);
        return p.join(' ') || '0';
      }
      return String(rule.value ?? 0);
    }

    function wireToggle(btn, subRow) {
      if (!btn || !subRow) return;
      btn.addEventListener('click', () => {
        subRow.hidden = !subRow.hidden;
        btn.classList.toggle('open', !subRow.hidden);
      });
    }

    function insertAfterRow(anchor, ...rows) {
      let ref = anchor;
      for (const r of rows) {
        if (r) { ref.insertAdjacentElement('afterend', r); ref = r; }
      }
    }

    function applyEnterKey(inputs, btn) {
      inputs.forEach(inp => inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') btn.click();
      }));
    }

    function nonZeroMods(mods) {
      const out = {};
      if (mods.lag_seconds)                out.lag_seconds = mods.lag_seconds;
      if (mods.saturation)                 out.saturation = mods.saturation;
      if (mods.diminishing_returns_factor) out.diminishing_returns_factor = mods.diminishing_returns_factor;
      return out;
    }

    // ── Authored ─────────────────────────────────────────────────────────────

    function renderAuthored(entries) {
      const tbody = document.getElementById('authored-tbody');
      tbody.innerHTML = '';
      for (const name of Object.keys(entries).sort()) {
        appendAuthoredRow(tbody, name, entries[name]);
      }
      tbody.appendChild(makeAuthoredNewRow());
    }

    function appendAuthoredRow(tbody, name, entry) {
      const {rule, history} = entry;
      const nameIn = txtIn(name, true);
      const valIn  = numIn(rule.value ?? 0, '6em');

      const mBtn = iBtn('⚙', 'btn-mod' + (hasModifiers(rule) ? ' active' : ''));
      const hc   = history?.length || 0;
      const hBtn = hc > 0 ? iBtn(`↺${hc}`, 'btn-hist') : null;
      const saveB = iBtn('✓', 'btn-save');
      const delB  = iBtn('✕', 'btn-del');

      const tr = document.createElement('tr');
      tr.className = 'metric-row';
      tr.append(
        mkTd(nameIn), mkTd(valIn),
        mkTd(mBtn, 'col-icon'), mkTd(hBtn, 'col-icon'),
        mkTd([saveB, delB], 'col-act'),
      );

      const {tr: modTr, getMods} = makeModRow(rule, 5);
      const histTr = makeHistRow(history, 5);
      if (histTr) histTr.dataset.metric = name;
      if (hBtn)   hBtn.dataset.metric   = name;

      mBtn.classList.toggle('open', !modTr.hidden);
      wireToggle(mBtn, modTr);
      wireToggle(hBtn, histTr);

      saveB.addEventListener('click', async () => {
        const mods = getMods();
        await wrapSave(() => saveMetric(name, {
          type: 'authored',
          value: parseFloat(valIn.value) || 0,
          ...nonZeroMods(mods),
        }));
      });
      delB.addEventListener('click', async () => {
        if (!confirm(`Delete "${name}"?`)) return;
        await wrapSave(() => deleteMetric(name));
      });
      applyEnterKey([valIn], saveB);

      tbody.appendChild(tr);
      insertAfterRow(tr, modTr, histTr);
    }

    function makeAuthoredNewRow() {
      const nameIn = txtInPh('name');
      const valIn  = numInPh('0', '6em');
      const saveB  = iBtn('✓', 'btn-save');

      const tr = document.createElement('tr');
      tr.className = 'metric-row new-row';
      tr.append(
        mkTd(nameIn), mkTd(valIn),
        mkTd(null, 'col-icon'), mkTd(null, 'col-icon'),
        mkTd(saveB, 'col-act'),
      );
      saveB.addEventListener('click', async () => {
        const name = nameIn.value.trim();
        if (!name) { nameIn.focus(); return; }
        await wrapSave(() => saveMetric(name, {
          type: 'authored', value: parseFloat(valIn.value) || 0,
        }));
      });
      applyEnterKey([nameIn, valIn], saveB);
      return tr;
    }

    // ── Capacity-Coupled ─────────────────────────────────────────────────────

    function renderCC(entries) {
      const tbody = document.getElementById('cc-tbody');
      tbody.innerHTML = '';
      for (const name of Object.keys(entries).sort()) {
        appendCCRow(tbody, name, entries[name]);
      }
      tbody.appendChild(makeCCNewRow());
    }

    function appendCCRow(tbody, name, entry) {
      const {rule, history} = entry;
      const nameIn  = txtIn(name, true);
      const baseIn  = numIn(rule.base ?? 0, '5em');
      const allocIn = numIn(rule.alloc_factor ?? 0, '5em');
      const nodeIn  = numIn(rule.node_factor ?? 0, '5em');
      const minIn   = numIn(rule.min ?? '', '4em'); if (!rule.min) minIn.placeholder = '—';
      const maxIn   = numIn(rule.max ?? '', '4em'); if (!rule.max) maxIn.placeholder = '—';

      const mBtn  = iBtn('⚙', 'btn-mod' + (hasModifiers(rule) ? ' active' : ''));
      const hc    = history?.length || 0;
      const hBtn  = hc > 0 ? iBtn(`↺${hc}`, 'btn-hist') : null;
      const saveB = iBtn('✓', 'btn-save');
      const delB  = iBtn('✕', 'btn-del');

      const tr = document.createElement('tr');
      tr.className = 'metric-row';
      tr.append(
        mkTd(nameIn), mkTd(baseIn), mkTd(allocIn), mkTd(nodeIn), mkTd(minIn), mkTd(maxIn),
        mkTd(mBtn, 'col-icon'), mkTd(hBtn, 'col-icon'),
        mkTd([saveB, delB], 'col-act'),
      );

      const {tr: modTr, getMods} = makeModRow(rule, 9);
      const histTr = makeHistRow(history, 9);
      if (histTr) histTr.dataset.metric = name;
      if (hBtn)   hBtn.dataset.metric   = name;

      mBtn.classList.toggle('open', !modTr.hidden);
      wireToggle(mBtn, modTr);
      wireToggle(hBtn, histTr);

      saveB.addEventListener('click', async () => {
        const mods = getMods();
        const r = {
          type: 'capacity_coupled',
          base: parseFloat(baseIn.value) || 0,
          alloc_factor: parseFloat(allocIn.value) || 0,
          node_factor: parseFloat(nodeIn.value) || 0,
          ...nonZeroMods(mods),
        };
        if (minIn.value !== '') r.min = parseFloat(minIn.value);
        if (maxIn.value !== '') r.max = parseFloat(maxIn.value);
        await wrapSave(() => saveMetric(name, r));
      });
      delB.addEventListener('click', async () => {
        if (!confirm(`Delete "${name}"?`)) return;
        await wrapSave(() => deleteMetric(name));
      });
      applyEnterKey([baseIn, allocIn, nodeIn, minIn, maxIn], saveB);

      tbody.appendChild(tr);
      insertAfterRow(tr, modTr, histTr);
    }

    function makeCCNewRow() {
      const nameIn  = txtInPh('name');
      const baseIn  = numInPh('0', '5em');
      const allocIn = numInPh('0', '5em');
      const nodeIn  = numInPh('0', '5em');
      const minIn   = numInPh('—', '4em');
      const maxIn   = numInPh('—', '4em');
      const saveB   = iBtn('✓', 'btn-save');

      const tr = document.createElement('tr');
      tr.className = 'metric-row new-row';
      tr.append(
        mkTd(nameIn), mkTd(baseIn), mkTd(allocIn), mkTd(nodeIn), mkTd(minIn), mkTd(maxIn),
        mkTd(null, 'col-icon'), mkTd(null, 'col-icon'), mkTd(saveB, 'col-act'),
      );
      saveB.addEventListener('click', async () => {
        const name = nameIn.value.trim();
        if (!name) { nameIn.focus(); return; }
        const r = {
          type: 'capacity_coupled',
          base: parseFloat(baseIn.value) || 0,
          alloc_factor: parseFloat(allocIn.value) || 0,
          node_factor: parseFloat(nodeIn.value) || 0,
        };
        if (minIn.value !== '') r.min = parseFloat(minIn.value);
        if (maxIn.value !== '') r.max = parseFloat(maxIn.value);
        await wrapSave(() => saveMetric(name, r));
      });
      applyEnterKey([nameIn, baseIn, allocIn, nodeIn, minIn, maxIn], saveB);
      return tr;
    }

    // ── Scheduled ────────────────────────────────────────────────────────────

    function renderScheduled(entries) {
      const tbody = document.getElementById('scheduled-tbody');
      tbody.innerHTML = '';
      const names = Object.keys(entries).sort();
      if (names.length === 0) {
        const tr = document.createElement('tr');
        const c = document.createElement('td');
        c.colSpan = 5; c.className = 'empty-msg';
        c.textContent = 'No scheduled metrics active.';
        tr.appendChild(c); tbody.appendChild(tr);
        return;
      }
      for (const name of names) {
        const {rule, history} = entries[name];
        const hc   = history?.length || 0;
        const hBtn = hc > 0 ? iBtn(`↺${hc}`, 'btn-hist') : null;
        const delB = iBtn('✕', 'btn-del');
        const info = rule.delta ? `${rule.delta}, ${rule.count} steps` : '';

        const tr = document.createElement('tr');
        tr.className = 'metric-row';
        tr.append(
          mkTd(name), mkTd(String(rule.value ?? 0)), mkTd(info, 'col-info'),
          mkTd(hBtn, 'col-icon'), mkTd(delB, 'col-act'),
        );

        const histTr = makeHistRow(history, 5);
        if (histTr) histTr.dataset.metric = name;
        if (hBtn)   hBtn.dataset.metric   = name;
        wireToggle(hBtn, histTr);

        delB.addEventListener('click', async () => {
          if (!confirm(`Delete "${name}"?`)) return;
          await wrapSave(() => deleteMetric(name));
        });

        tbody.appendChild(tr);
        if (histTr) insertAfterRow(tr, histTr);
      }
    }

    // ── Schedule form ─────────────────────────────────────────────────────────

    const sfDelta    = document.getElementById('sf-delta');
    const sfChange   = document.getElementById('sf-change');
    const sfStepLbl  = document.getElementById('sf-step-label');
    const sfPreview  = document.getElementById('sf-preview');

    function updateSchedulePreview() {
      const start    = parseFloat(document.getElementById('sf-start').value) || 0;
      const count    = Math.max(1, parseInt(document.getElementById('sf-count').value) || 1);
      const delta    = sfDelta.value;
      const step     = parseFloat(sfChange.value) || 0;
      const interval = parseFloat(document.getElementById('sf-interval').value) || 5;

      sfStepLbl.hidden = (delta === 'linear');

      const values = [];
      for (let i = 0; i < count; i++) {
        const change = delta === 'linear' ? start : step;
        values.push(start + change * (i + 1));
      }
      sfPreview.textContent = values
        .map((v, i) => `t+${(i * interval).toFixed(0)}s → ${v}`)
        .join('  ');
    }

    ['sf-start','sf-count','sf-interval','sf-change'].forEach(id =>
      document.getElementById(id).addEventListener('input', updateSchedulePreview));
    sfDelta.addEventListener('change', updateSchedulePreview);

    document.getElementById('sf-run').addEventListener('click', async () => {
      const name = document.getElementById('sf-name').value.trim();
      if (!name) { document.getElementById('sf-name').focus(); return; }
      const req = {
        name,
        start_value:      parseFloat(document.getElementById('sf-start').value) || 0,
        count:            Math.max(1, parseInt(document.getElementById('sf-count').value) || 1),
        delta:            sfDelta.value,
        change_to_value:  parseFloat(sfChange.value) || 0,
        interval_seconds: parseFloat(document.getElementById('sf-interval').value) || 5,
      };
      const runBtn = document.getElementById('sf-run');
      runBtn.disabled = true;
      sfPreview.textContent = 'sending…';
      try {
        const res = await fetch(`${worldBase}/schedule`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(req),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        setStatus(`schedule started: ${name} (${req.count} steps)`);
        sfPreview.textContent = `▶ running: step 1/${req.count}`;

        // Poll for updates throughout the schedule duration.
        const pollMs = Math.max(1000, req.interval_seconds * 1000 * 0.5);
        const totalMs = req.interval_seconds * 1000 * req.count;
        const deadline = Date.now() + totalMs + 2000; // +2s buffer
        let step = 1;
        const timer = setInterval(async () => {
          step++;
          await loadWorld();
          if (Date.now() >= deadline) {
            clearInterval(timer);
            runBtn.disabled = false;
            updateSchedulePreview();
          } else {
            sfPreview.textContent = `▶ running: step ${Math.min(step, req.count)}/${req.count}`;
          }
        }, pollMs);
      } catch (err) {
        setStatus(`schedule error: ${err.message}`);
        sfPreview.textContent = '';
        runBtn.disabled = false;
      }
    });

    // ── metrics Sampled ──────────────────────

    async function loadSampledMetrics() {
      try {
        const res = await fetch('/v1/sampled-metrics');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        renderSampledMetrics(data.metrics || {});
      } catch (err) {
        const t = document.getElementById('sampled-metric-table');
        t.querySelectorAll('tbody').forEach(b => b.remove());
        const tb = document.createElement('tbody');
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 3; td.textContent = `error: ${err.message}`;
        tr.appendChild(td); tb.appendChild(tr); t.appendChild(tb);
      }
    }

    function groupByPrefix(metrics) {
      const groups = {};
      for (const [name, entry] of Object.entries(metrics)) {
        const key = name.split('.').slice(0, 3).join('.');
        if (!groups[key]) groups[key] = [];
        groups[key].push({name, entry});
      }
      return groups;
    }

    function renderSampledMetrics(metrics) {
      const table = document.getElementById('sampled-metric-table');
      table.querySelectorAll('tbody').forEach(b => b.remove());

      const groups = groupByPrefix(metrics);
      const keys = Object.keys(groups).sort();
      if (keys.length === 0) {
        const tb = document.createElement('tbody');
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 3; td.textContent = 'No sampled metrics.';
        tr.appendChild(td); tb.appendChild(tr); table.appendChild(tb);
        return;
      }

      for (const key of keys) {
        const items = groups[key].sort((a, b) => a.name.localeCompare(b.name));
        const tb = document.createElement('tbody');
        tb.className = 'sampled-group';

        // Group header row
        const hdrTr = document.createElement('tr');
        hdrTr.className = 'sampled-group-summary';
        const hdrTd = document.createElement('td');
        hdrTd.colSpan = 3;
        const caret = document.createElement('span');
        caret.className = 'caret'; caret.textContent = '▶';
        const lbl = document.createElement('span');
        lbl.textContent = key;
        hdrTd.append(caret, lbl);
        hdrTr.appendChild(hdrTd);
        tb.appendChild(hdrTr);

        let open = false;
        const metricRows = [];

        function setOpen(v) {
          open = v;
          caret.style.transform = v ? 'rotate(90deg)' : '';
          metricRows.forEach(r => r.hidden = !v);
        }
        hdrTr.addEventListener('click', () => setOpen(!open));

        for (const {name, entry} of items) {
          const tr = document.createElement('tr');
          tr.className = 'sampled-metric-row'; tr.hidden = true;

          const nameTd = document.createElement('td');
          nameTd.className = 'sampled-metric-name'; nameTd.textContent = name;

          const valTd = document.createElement('td');
          valTd.className = 'sampled-metric-value'; valTd.textContent = entry.value;

          const actTd = document.createElement('td');
          actTd.className = 'sampled-act-col';

          const authoredBtn = document.createElement('button');
          authoredBtn.className = 'sampled-type-btn'; authoredBtn.textContent = '→ authored';
          authoredBtn.addEventListener('click', async () => {
            await wrapSave(() => saveMetric(name, {type: 'authored', value: entry.value}));
          });

          const ccBtn = document.createElement('button');
          ccBtn.className = 'sampled-type-btn'; ccBtn.textContent = '→ cc';
          ccBtn.title = 'add as capacity-coupled with this value as base';
          ccBtn.addEventListener('click', async () => {
            await wrapSave(() => saveMetric(name, {
              type: 'capacity_coupled', base: entry.value,
              alloc_factor: 0, node_factor: 0,
            }));
          });

          const schedBtn = document.createElement('button');
          schedBtn.className = 'sampled-type-btn'; schedBtn.textContent = '→ schedule';
          schedBtn.addEventListener('click', () => {
            document.getElementById('sf-name').value = name;
            document.getElementById('sf-start').value = entry.value;
            updateSchedulePreview();
            document.querySelector('details:has(#sf-run)').open = true;
            document.getElementById('sf-name').focus();
          });

          actTd.append(authoredBtn, ccBtn, schedBtn);
          tr.append(nameTd, valTd, actTd);
          metricRows.push(tr);
          tb.appendChild(tr);
        }

        table.appendChild(tb);
      }
    }

    // ── Reset ────────────────────────────────────────────────────────────────

    document.getElementById('reset-btn').addEventListener('click', async () => {
      if (!confirm(`Reset world "${worldID}"? Clears all metrics and starts a new run.`)) return;
      try {
        await fetch(`${worldBase}/reset`, {method: 'POST'});
        await loadWorld();
        setStatus('world reset');
      } catch (err) {
        setStatus(`reset error: ${err.message}`);
      }
    });

    // ── Init ─────────────────────────────────────────────────────────────────

    updateSchedulePreview();
    renderAll();
    loadWorld();
    loadSampledMetrics();
  </script>
</body>
</html>
